<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- CONCEPT 3 — "Pirate FKT"
       L'âme Ravito : FKT en solo, courses pirates, hors circuit.
       Un gobelet croisé avec un trekking pole, façon jolly roger outdoor. -->
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a2220"/>
      <stop offset="100%" stop-color="#0b0f0e"/>
    </radialGradient>
    <linearGradient id="gobLime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9ff5e"/>
      <stop offset="100%" stop-color="#9ad420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg3)"/>

  <!-- Cercle/médaille -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#c6ff3d" stroke-width="8" opacity="0.2"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="#c6ff3d" stroke-width="2" opacity="0.4"/>

  <!-- Deux trekking poles croisés en arrière-plan -->
  <g stroke="#c6ff3d" stroke-width="18" stroke-linecap="round" opacity="0.85">
    <!-- Pôle gauche -->
    <line x1="260" y1="280" x2="720" y2="780"/>
    <!-- Dragonne -->
    <circle cx="260" cy="280" r="22" fill="none" stroke-width="10"/>
    <!-- Pointe -->
    <line x1="720" y1="780" x2="760" y2="820" stroke-width="14"/>

    <!-- Pôle droit -->
    <line x1="764" y1="280" x2="304" y2="780"/>
    <circle cx="764" cy="280" r="22" fill="none" stroke-width="10"/>
    <line x1="304" y1="780" x2="264" y2="820" stroke-width="14"/>
  </g>

  <!-- Gobelet central (par-dessus) -->
  <g transform="translate(512 530) scale(14) translate(-16 -16)">
    <path
      d="M8 10 L24 10 L22 26 Q22 28 20 28 L12 28 Q10 28 10 26 Z"
      fill="url(#gobLime)"
      stroke="#0b0f0e"
      stroke-width="0.5"
    />
    <path
      d="M10 10 L22 10 L22 13 L10 13 Z"
      fill="#7db800"
      opacity="0.7"
    />
    <path
      d="M16 2 Q12 7 12 9 Q12 11 16 11 Q20 11 20 9 Q20 7 16 2 Z"
      fill="url(#gobLime)"
    />
  </g>

  <!-- Bannière texte -->
  <text
    x="512" y="900"
    text-anchor="middle"
    font-family="Inter, sans-serif"
    font-weight="900"
    font-size="64"
    fill="#c6ff3d"
    letter-spacing="12"
  >RAVITO</text>
</svg>
