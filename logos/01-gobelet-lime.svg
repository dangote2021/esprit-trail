<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- CONCEPT 1 — "Le Gobelet" (signature Ravito)
       Un gobelet de ravito qui déborde d'une goutte d'énergie.
       C'est LE symbole littéral : tu cours, tu passes au ravito, tu repars. -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1512"/>
      <stop offset="100%" stop-color="#0b0f0e"/>
    </linearGradient>
    <linearGradient id="lime1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9ff5e"/>
      <stop offset="100%" stop-color="#a8e831"/>
    </linearGradient>
  </defs>

  <!-- Fond carré arrondi iOS-style -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg1)"/>

  <!-- Glow subtil derrière -->
  <circle cx="512" cy="560" r="340" fill="#c6ff3d" opacity="0.08"/>

  <!-- Gobelet + goutte (sans le fond) -->
  <g transform="translate(512 512) scale(22) translate(-16 -16)">
    <!-- Corps du gobelet -->
    <path
      d="M8 10 L24 10 L22 26 Q22 28 20 28 L12 28 Q10 28 10 26 Z"
      fill="url(#lime1)"
    />
    <!-- Rebord du gobelet -->
    <path
      d="M10 10 L22 10 L22 13 L10 13 Z"
      fill="#a8e831"
      opacity="0.6"
    />
    <!-- Goutte d'énergie au-dessus -->
    <path
      d="M16 2 Q12 7 12 9 Q12 11 16 11 Q20 11 20 9 Q20 7 16 2 Z"
      fill="url(#lime1)"
    />
  </g>

  <!-- Highlight brillant en haut à gauche -->
  <path
    d="M 200 200 Q 340 180 480 220"
    stroke="#ffffff"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
    opacity="0.25"
  />
</svg>
