
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#F0E6C8"/>

  <!-- Bloc icône en haut (centré, sans fond vert pour s'intégrer dans le cream) -->
  <g transform="translate(0 60)">
    <!-- Soleil -->
    <circle cx="780" cy="280" r="90" fill="#F77F00" opacity="0.9"/>
    <!-- 3 pics étagés -->
    <g stroke="#0B1D0E" stroke-width="7" stroke-linejoin="round">
      <path d="M 100 720 L 250 460 L 380 580 L 380 720 Z" fill="#2D6A4F"/>
      <path d="M 280 720 L 540 250 L 720 480 L 800 380 L 920 720 Z" fill="#1B4332"/>
      <path d="M 700 720 L 820 540 L 924 720 Z" fill="#2D6A4F" opacity="0.85"/>
    </g>
    <!-- Sentier sinueux -->
    <path d="M 80 760 Q 250 720 400 760 T 700 740 T 944 770"
      fill="none" stroke="#F77F00" stroke-width="14" stroke-linecap="round"/>
    <g fill="#F77F00">
      <circle cx="160" cy="740" r="6"/>
      <circle cx="320" cy="750" r="6"/>
      <circle cx="500" cy="750" r="6"/>
      <circle cx="660" cy="740" r="6"/>
      <circle cx="820" cy="760" r="6"/>
    </g>
  </g>

  <!-- Wordmark RAVITO (heavy condensed) en bas -->
  <g transform="translate(512 870)" text-anchor="middle">
    <text font-family="Impact, 'Helvetica Neue Condensed Black', sans-serif"
          font-weight="900" font-size="160" letter-spacing="-8" fill="#0B1D0E">RAVITO</text>
    <rect x="-100" y="20" width="200" height="6" rx="2" fill="#F77F00"/>
    <text y="58" font-family="ui-monospace, 'SF Mono', monospace"
          font-weight="700" font-size="22" letter-spacing="10" fill="#2D6A4F">L'ESPRIT TRAIL</text>
  </g>
</svg>
