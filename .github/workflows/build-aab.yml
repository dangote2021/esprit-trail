name: Build Android .aab (TWA)

# Trigger manually from GitHub UI: Actions → Build Android .aab (TWA) → Run workflow
on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version name (e.g. 1.0.8)'
        required: true
        default: '1.0.8'
      versionCode:
        description: 'Version code (integer, must be > previous Play Store upload)'
        required: true
        default: '8'
      productionRelease:
        description: 'Enable pre-public-release fixes (orientation=any, edge-to-edge opt-out). Set to true for v1.0.9+ public launch.'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (skip JDK/SDK auto-install)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF
          # Symlink for bubblewrap's expected SDK structure
          if [ ! -d "${ANDROID_HOME}/tools" ]; then
            ln -sf "${ANDROID_HOME}/cmdline-tools/latest" "${ANDROID_HOME}/tools" || true
          fi

      - name: Decode signing keystore from secret
        run: |
          mkdir -p twa
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > twa/android.keystore
          ls -la twa/android.keystore
          # Verify keystore is valid
          keytool -list -keystore twa/android.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | head -3

      - name: Initialize Bubblewrap project
        working-directory: twa
        run: |
          # Pre-create twa-manifest.json so init uses our config
          yes "" | bubblewrap init \
            --manifest=https://esprit-trail.vercel.app/manifest.webmanifest \
            --directory=. \
            --skipPwaValidation || true
          ls -la

      - name: Patch twa-manifest.json (packageId, key alias, version)
        working-directory: twa
        env:
          PRODUCTION_RELEASE: ${{ inputs.productionRelease }}
        run: |
          # Override generated config with our required values
          python3 <<'PYEOF'
          import json, os
          with open('twa-manifest.json', 'r') as f:
              m = json.load(f)
          m['packageId'] = 'app.ravito'
          m['signingKey'] = {
              'path': os.path.abspath('android.keystore'),
              'alias': 'my-key-alias'
          }
          m['appVersionName'] = "${{ inputs.versionName }}"
          m['appVersionCode'] = int("${{ inputs.versionCode }}")
          m['appVersion'] = "${{ inputs.versionName }}"
          m['host'] = 'esprit-trail.vercel.app'
          m['name'] = 'Esprit Trail'
          m['launcherName'] = 'Esprit Trail'

          # Pre-public-release fixes (Play Console warnings)
          if os.environ.get('PRODUCTION_RELEASE') == 'true':
              # Fix Play Console warning #2 — orientation lock on large screens (Android 16+)
              # Allow rotation so tablets/foldables aren't forced into portrait.
              m['orientation'] = 'any'
              print('[PROD] Applied fix: orientation=any (large-screen warning)')

          with open('twa-manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          print(json.dumps(m, indent=2))
          PYEOF

      - name: Regenerate Android project with patched manifest
        working-directory: twa
        run: |
          # Bubblewrap update regenerates gradle/AndroidManifest from twa-manifest.json
          printf "${{ inputs.versionName }}\n${{ inputs.versionCode }}\n" | bubblewrap update || true
          # Verify package ID is correctly written
          grep -r 'applicationId' app/build.gradle | head -3

      - name: Apply pre-public-release Android resource fixes
        if: ${{ inputs.productionRelease == true }}
        working-directory: twa
        run: |
          # Fix Play Console warning #1 — edge-to-edge enforcement (Android 15+)
          # TWA wraps a PWA whose CSS already uses safe-area-insets; opt out of
          # Android's automatic enforcement to keep current rendering.
          STYLES_DIR="app/src/main/res/values-v31"
          STYLES_FILE="$STYLES_DIR/styles.xml"
          mkdir -p "$STYLES_DIR"

          if [ ! -f "$STYLES_FILE" ]; then
            cat > "$STYLES_FILE" <<'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LauncherActivity" parent="Theme.LauncherActivityBase">
                  <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>
              </style>
          </resources>
          XMLEOF
            echo "[PROD] Created $STYLES_FILE with edge-to-edge opt-out"
          else
            # Insert the opt-out into existing theme if not already present
            if ! grep -q "windowOptOutEdgeToEdgeEnforcement" "$STYLES_FILE"; then
              python3 <<PYEOF
          import re
          with open("$STYLES_FILE", 'r') as f:
              content = f.read()
          # Insert after first <style ...> tag
          new = re.sub(
              r'(<style[^>]*>)',
              r'\1\n        <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>',
              content, count=1
          )
          with open("$STYLES_FILE", 'w') as f:
              f.write(new)
          print("[PROD] Patched existing styles.xml with edge-to-edge opt-out")
          PYEOF
            else
              echo "[PROD] styles.xml already contains the opt-out, skipping"
            fi
          fi

          echo "--- Final styles.xml ---"
          cat "$STYLES_FILE"

      - name: Build .aab
        working-directory: twa
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build --skipPwaValidation
          ls -la app/build/outputs/bundle/release/

      - name: Sign .aab with jarsigner (Bubblewrap doesn't sign AAB by default)
        working-directory: twa
        run: |
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "Signing: $AAB"
          jarsigner \
            -keystore android.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            "$AAB" my-key-alias
          # Verify signature
          jarsigner -verify "$AAB" && echo "✓ AAB signed correctly"

      - name: Locate built artifacts
        id: artifacts
        working-directory: twa
        run: |
          AAB=$(find . -name "*.aab" | head -1)
          APK=$(find . -name "*-release-signed.apk" | head -1)
          echo "Found AAB: $AAB"
          echo "Found APK: $APK"
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: esprit-trail-${{ inputs.versionName }}-aab
          path: twa/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload signed .apk artifact (optional, for sideload testing)
        uses: actions/upload-artifact@v4
        with:
          name: esprit-trail-${{ inputs.versionName }}-apk
          path: twa/**/*-release-signed.apk
          if-no-files-found: warn
          retention-days: 30
